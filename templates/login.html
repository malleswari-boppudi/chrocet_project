<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrocet | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff8f5, #fde9e3, #f9f1ee);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            font-size: 38px;
            margin-bottom: 10px;
        }

        .brand {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #d97745;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
        }

        .btn-login {
            background: #d97745;
            color: white;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #b85c2b;
        }

        a {
            color: #d97745;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #888;
        }

        .social-btn {
            width: 100%;
            margin-bottom: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">🧶</div>

        <div class="brand">Chrocet</div>

        <p class="subtitle">Handmade with Love ❤️</p>
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}
        <form action="/authenticate" method="POST">
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Remember Me</label>
                </div>

                <a href="#">Forgot Password?</a>
            </div>

            <button class="btn btn-login w-100">Login</button>

            <div class="divider">OR</div>

            <button type="button" class="btn btn-outline-danger social-btn">
                Continue with Google
            </button>

            <button type="button" class="btn btn-outline-dark social-btn">
                Continue with Apple
            </button>

            <div class="footer">
                Don't have an account?
                <a href="register.html">Create Account</a>
            </div>
        </form>
    </div>
</body>

</html>
