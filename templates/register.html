<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrocet | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fff8f5, #fde9e3, #f9f1ee);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .register-card {
            width: 500px;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
        }

        .logo {
            text-align: center;
            font-size: 42px;
        }

        .brand {
            text-align: center;
            color: #d97745;
            font-size: 34px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
        }

        .btn-register {
            background: #d97745;
            color: white;
            border: none;
            height: 50px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-register:hover {
            background: #b86032;
            color: white;
        }

        a {
            color: #d97745;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="register-card">

        <div class="logo">
            🧶
        </div>

        <div class="brand">
            Chrocet
        </div>

        <p class="subtitle">
            Create your account
        </p>

        <form action="/register" method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="tel" class="form-control" name="phone" placeholder="Enter phone number" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Create password" required>
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" placeholder="Confirm password"
                    required>
            </div>

            <button class="btn btn-register w-100">
                Create Account
            </button>

            <div class="footer">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </div>

        </form>

    </div>

</body>

</html>
