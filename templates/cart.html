<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #fff8f5
        }

        .btn-theme {
            background: #c06c84;
            color: #fff
        }

        .btn-theme:hover {
            background: #a44f69;
            color: #fff
        }

        footer {
            background: #2d2d2d;
            color: #fff
        }
    </style>
</head>

<body>
    <nav class="navbar bg-white shadow-sm">
        <div class="container"><a class="navbar-brand fw-bold" href="/">🧶 Hooked by Malli</a>
            <div><a href="/" class="btn btn-outline-secondary">Home</a></div>
        </div>
    </nav>
    <div class="container py-5">
        <h2 class="mb-4">Shopping Cart</h2>
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="static/images/teddy_sale.jpeg" width="80" class="rounded me-3">Crochet Teddy</td>
                    <td>₹2400</td>
                    <td><input type="number" value="1" min="1" class="form-control" style="width:80px"></td>
                    <td>₹2400</td>
                    <td><button class="btn btn-danger">Remove</button></td>
                </tr>
                <tr>
                    <td><img src="static/images/flower_bouquet_sale.jpg" width="80" class="rounded me-3">Flower Bouquet
                    </td>
                    <td>₹1500</td>
                    <td><input type="number" value="1" min="1" class="form-control" style="width:80px"></td>
                    <td>₹1500</td>
                    <td><button class="btn btn-danger">Remove</button></td>
                </tr>
            </tbody>
        </table>
        <div class="row justify-content-end">
            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Order Summary</h4>
                    <hr>
                    <p>Subtotal <span class="float-end">₹3900</span></p>
                    <p>Shipping <span class="float-end">Free</span></p>
                    <h5>Total <span class="float-end">₹3900</span></h5>
                    <a href="/checkout" class="btn btn-theme w-100 mt-3">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center py-3 mt-5">© 2026 Hooked by Malli</footer>
</body>

</html>
