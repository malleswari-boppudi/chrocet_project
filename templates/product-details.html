<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked by Malli | Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #fffaf8
        }

        .navbar {
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08)
        }

        .price {
            font-size: 2rem;
            color: #c06c84;
            font-weight: bold
        }

        .btn-theme {
            background: #c06c84;
            color: #fff
        }

        .btn-theme:hover {
            background: #a44f69;
            color: #fff
        }

        .thumb {
            cursor: pointer;
            border: 2px solid transparent
        }

        .thumb:hover {
            border-color: #c06c84
        }

        footer {
            background: #2d2d2d;
            color: #fff
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🧶 Hooked by Malli</a>
            <div class="ms-auto">
                <a href="/" class="btn btn-outline-secondary me-2">Home</a>
                <a href="/cart" class="btn btn-outline-secondary me-2">Cart</a>
                <a href="/login" class="btn btn-theme">Login</a>
            </div>
        </div>
    </nav>
    <h2>{{ product.name }}</h2>

    <p class="price">
        ₹{{ product.price }}
    </p>

    <p>
        {{ product.description }}
    </p>

    <img id="mainImg" src="{{ url_for('static', filename='images/' + product.image) }}"
        class="img-fluid rounded shadow">

    <footer class="text-center py-4 mt-5">
        © 2026 Hooked by Malli
    </footer>

    <script>
        function swap(img) { document.getElementById('mainImg').src = img.src; }
    </script>
</body>

</html>
